<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FEFCF9">
  <title>Каталог мастера</title>

  <link rel="preconnect" href="https://telegram.org">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://zbxbeagmqmnijkjhhcgp.supabase.co">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Supabase SDK (локальный UMD-бандл) -->
  <script src="js/lib/supabase.min.js"></script>

  <!-- ДИАГНОСТИКА: перехватить ошибку ДО загрузки модулей -->
  <script>
    window._appStarted = false;
    window._lastError = null;
    window._lastRejection = null;

    // Перехватить синхронные JS-ошибки (включая ошибки загрузки модулей)
    window.addEventListener('error', function(e) {
      var detail = (e.message || 'unknown') + '\n' + (e.filename || '').split('/').slice(-2).join('/') + ':' + (e.lineno || 0);
      window._lastError = detail;
      console.error('[diag:error]', detail);
    });

    // Перехватить отклонённые промисы (включая динамические импорты)
    window.addEventListener('unhandledrejection', function(e) {
      var detail = String(e.reason || 'unknown rejection');
      window._lastRejection = detail;
      console.error('[diag:rejection]', detail);
    });

    // Watchdog: если init() не запустился за 8 сек — показать ошибку
    setTimeout(function() {
      if (window._appStarted) return;
      var overlay = document.getElementById('loading-overlay');
      if (overlay) overlay.style.display = 'none';
      var sc = document.getElementById('screen-container');
      if (!sc) return;
      var errText = window._lastError || window._lastRejection || 'init() не запустился (JS-модуль не загрузился)';
      sc.innerHTML = [
        '<div style="padding:32px 20px;font-family:Inter,sans-serif">',
        '<div style="font-size:28px;text-align:center;margin-bottom:12px">❌</div>',
        '<div style="font-weight:600;font-size:16px;margin-bottom:6px;text-align:center">Ошибка загрузки</div>',
        '<div style="color:#999;font-size:13px;text-align:center;margin-bottom:16px">Детали ошибки:</div>',
        '<pre style="background:#f5f5f5;border-radius:8px;padding:12px;font-size:11px;white-space:pre-wrap;word-break:break-all;color:#333">',
        errText,
        '</pre>',
        '<div style="color:#bbb;font-size:11px;margin-top:12px;text-align:center">',
        'window.supabase: ' + (typeof window.supabase) + '<br>',
        'initData: ' + (window.Telegram?.WebApp?.initData ? 'OK (' + window.Telegram.WebApp.initData.length + ' chars)' : 'missing'),
        '</div>',
        '</div>',
      ].join('');
    }, 8000);
  </script>

  <link rel="stylesheet" href="css/style.css">

  <style>
    #loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--tg-theme-bg-color, #FEFCF9);
      z-index: 9999;
      transition: opacity 0.3s;
      gap: 16px;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(212, 136, 136, 0.2);
      border-top-color: #D48888;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text {
      font-family: Inter, sans-serif;
      font-size: 14px;
      color: var(--tg-theme-hint-color, #999);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Загрузка...</div>
  </div>

  <div id="app">
    <div id="mode-switcher" style="display: none;">
      <button id="mode-client" class="mode-btn active">Клиент</button>
      <button id="mode-master" class="mode-btn">Мастер</button>
    </div>
    <div id="screen-container"></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
