<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FEFCF9">
  <title>Каталог мастера</title>

  <!-- Preconnect -->
  <link rel="preconnect" href="https://telegram.org">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://zbxbeagmqmnijkjhhcgp.supabase.co">

  <!-- Google Fonts: Playfair Display + Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Supabase SDK (локальный UMD-бандл, без внешних CDN) -->
  <script src="js/lib/supabase.min.js"></script>

  <!-- Стили -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    #loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--tg-theme-bg-color, #FEFCF9);
      z-index: 9999;
      transition: opacity 0.3s;
      gap: 16px;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(212, 136, 136, 0.2);
      border-top-color: #D48888;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text {
      font-family: Inter, sans-serif;
      font-size: 14px;
      color: var(--tg-theme-hint-color, #999);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script>
    // Глобальный watchdog: если init() не отработал за 15 сек — показать ошибку
    window._appStarted = false;
    setTimeout(function() {
      if (!window._appStarted) {
        var overlay = document.getElementById('loading-overlay');
        if (overlay) overlay.style.display = 'none';
        var container = document.getElementById('screen-container');
        if (container) container.innerHTML = '<div style="padding:40px 20px;text-align:center;font-family:Inter,sans-serif"><div style="font-size:32px;margin-bottom:12px">❌</div><div style="font-weight:600;margin-bottom:8px">Ошибка загрузки</div><div style="color:#999;font-size:14px">Перезапустите приложение</div><div id="err-detail" style="color:#bbb;font-size:12px;margin-top:8px"></div></div>';
      }
    }, 15000);

    // Перехват JS-ошибок для отладки
    window.onerror = function(msg, src, line, col, err) {
      console.error('[app-error]', msg, src, line, col);
      var el = document.getElementById('err-detail');
      if (el) el.textContent = msg + ' (' + (src || '').split('/').pop() + ':' + line + ')';
    };
    window.addEventListener('unhandledrejection', function(e) {
      console.error('[app-rejection]', e.reason);
    });
  </script>
</head>
<body>
  <!-- Оверлей загрузки (скрывается после аутентификации) -->
  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Загрузка...</div>
  </div>

  <!-- Контейнер приложения -->
  <div id="app">
    <!-- Переключатель режима (только для debug в браузере, скрыт по умолчанию) -->
    <div id="mode-switcher" style="display: none;">
      <button id="mode-client" class="mode-btn active">Клиент</button>
      <button id="mode-master" class="mode-btn">Мастер</button>
    </div>

    <!-- Контейнер экранов -->
    <div id="screen-container"></div>
  </div>

  <!-- JS-модули -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
